<!DOCTYPE html>
<html>
<head>
    <title>Bus Tracking System</title>
    <style>
        #map { height: 500px; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
let map;
let marker;

let busLocation = { lat: 23.8103, lng: 90.4125 };

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center: busLocation
    });

    marker = new google.maps.Marker({
        position: busLocation,
        map: map,
        icon: {
            url: 'https://static.thenounproject.com/png/bus-icon-888652-512.png',
            scaledSize: new google.maps.Size(50, 50)
        }
    });

    setInterval(() => {
        busLocation.lat += 0.0005;
        busLocation.lng += 0.0005;
        marker.setPosition(busLocation);
        map.setCenter(busLocation);
    }, 2000);
}
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzKbh1eG5jd9DqFPqPmmB-tiIpma6qiuM&callback=initMap"></script>

</body>
</html>
